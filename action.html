<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living Ecosystem | Birds & City</title>
    
    <!-- NEW: Security Meta Tags -->
    <!-- Content Security Policy: restricts who can run scripts on this page -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://translate.google.com https://translate.googleapis.com https://www.gstatic.com;">
    <!-- Prevent Clickjacking -->
    <meta http-equiv="X-Frame-Options" content="DENY">
    <!-- XSS Protection -->
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <!-- Prevent MIME Sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- NEW: Crypto-JS for Encryption -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        
        #ui-layer {
            position: absolute;
            top: 20px; left: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            pointer-events: none;
            z-index: 10;
        }
        
        h1 { margin: 0; font-size: 3rem; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        p { font-size: 1.2rem; margin-top: 5px; }
        
        .back-link {
            position: absolute;
            top: 30px; right: 30px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.3);
            padding: 10px 25px;
            border-radius: 30px;
            pointer-events: auto;
            z-index: 10;
            transition: background 0.3s;
        }
        .back-link:hover { background: rgba(0,0,0,0.5); }

        /* NEW: Security Badge Styling */
        .security-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 20, 40, 0.7);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        .security-dot {
            width: 8px;
            height: 8px;
            background: #00ff00;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff00;
            animation: pulse-green 2s infinite;
        }
        .security-text {
            color: #00ff00;
            font-size: 0.75rem;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        @keyframes pulse-green {
            0% { opacity: 0.5; box-shadow: 0 0 2px #00ff00; }
            50% { opacity: 1; box-shadow: 0 0 12px #00ff00; }
            100% { opacity: 0.5; box-shadow: 0 0 2px #00ff00; }
        }
    </style>
</head>
<body>

    <!-- NEW: Security Badge -->
    <div class="security-overlay">
        <div class="security-dot"></div>
        <span class="security-text">SECURE CONNECTION | AES-256</span>
    </div>

    <div id="ui-layer">
        <h1>Nature Restored</h1>
        <p>Birds nest in the forest while the city watches.</p>
    </div>
    <a href="climate.html" class="back-link">⬅ Back to Home</a>
    
    <script>
        // --- 0. HIGH SECURITY MODULE ---
        (function() {
            console.log("%c SECURITY PROTOCOL INITIATED ", "background: #000; color: #00ff00; font-size: 16px; padding: 5px;");
            
            // 1. Data Encryption Helper (For any local storage usage)
            window.SecureVault = {
                key: "ACTION_PAGE_SECURE_KEY_VX99", // Key for local encryption
                encrypt: function(data) {
                    return CryptoJS.AES.encrypt(JSON.stringify(data), this.key).toString();
                },
                decrypt: function(ciphertext) {
                    try {
                        const bytes = CryptoJS.AES.decrypt(ciphertext, this.key);
                        return JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
                    } catch(e) { return null; }
                }
            };

            // 2. Anti-Tamper / Anti-Debug (Basic Deterrents)
            document.addEventListener('contextmenu', event => event.preventDefault()); // Disable Right Click
            
            document.onkeydown = function(e) {
                // Disable F12, Ctrl+U, Ctrl+Shift+I (DevTools)
                if(e.keyCode == 123) { return false; }
                if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)){ return false; }
                if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)){ return false; }
                if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)){ return false; }
                if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)){ return false; }
            }
        })();

        // --- 1. SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Clear Blue Sky (No Fog)

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
        camera.position.set(0, 25, 45); // High vantage point
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- 2. LIGHTING ---
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffd700, 1.2);
        dirLight.position.set(50, 80, 50);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.left = -50;
        dirLight.shadow.camera.right = 50;
        dirLight.shadow.camera.top = 50;
        dirLight.shadow.camera.bottom = -50;
        scene.add(dirLight);

        // --- 3. ENVIRONMENT ---
        
        // Ground
        const groundGeo = new THREE.CircleGeometry(80, 64);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x7cb342, roughness: 1 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Flowers
        const flowerGeo = new THREE.CircleGeometry(0.15, 5);
        for(let i=0; i<600; i++) {
            const mat = new THREE.MeshBasicMaterial({ color: Math.random()>0.5 ? 0xffeb3b : 0xffffff });
            const flower = new THREE.Mesh(flowerGeo, mat);
            const r = 5 + Math.random() * 60;
            const th = Math.random() * Math.PI * 2;
            flower.position.set(r*Math.cos(th), 0.02, r*Math.sin(th));
            flower.rotation.x = -Math.PI/2;
            scene.add(flower);
        }

        // City Skyline Background
        const cityGroup = new THREE.Group();
        const bldgMat = new THREE.MeshLambertMaterial({ color: 0x607d8b }); // Grey-Blue
        const winMat = new THREE.MeshBasicMaterial({ color: 0xffeb3b });    // Yellow Lights

        for(let i=0; i<200; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 90 + Math.random() * 40; // Distant ring
            
            const w = 5 + Math.random() * 10;
            const h = 20 + Math.random() * 80; // Tall
            const d = 5 + Math.random() * 10;

            const bldg = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), bldgMat);
            bldg.position.set(Math.cos(angle)*radius, h/2 - 5, Math.sin(angle)*radius);
            bldg.lookAt(0, h/2, 0);
            
            // Random windows
            if(Math.random() > 0.7) {
                const win = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), winMat);
                win.position.set(0, h/3, d/2 + 0.1); // Simple window accent
                bldg.add(win);
            }
            cityGroup.add(bldg);
        }
        scene.add(cityGroup);

        // Lakes (Blue Water)
        const lakes = [];
        const lakeMat = new THREE.MeshPhongMaterial({ 
            color: 0x0288d1, 
            emissive: 0x001020, 
            specular: 0x111111, 
            shininess: 90, 
            opacity: 0.9, 
            transparent: true 
        });

        function createLake(x, z, r) {
            const lake = new THREE.Mesh(new THREE.CircleGeometry(r, 32), lakeMat);
            lake.rotation.x = -Math.PI/2;
            lake.position.set(x, 0.05, z);
            scene.add(lake);
            lakes.push({x, z, r});
        }
        createLake(20, 15, 8);
        createLake(-25, -10, 9);
        createLake(-5, 30, 5);

        // Safety check for pathfinding
        function isSafeZone(x, z) {
            for(let l of lakes) {
                if(Math.hypot(x-l.x, z-l.z) < l.r + 2) return false;
            }
            return true;
        }

        // --- 4. CLASSES ---

        // A. REALISTIC BIRD (With Nesting)
        class Bird {
            constructor() {
                this.mesh = new THREE.Group();
                const bodyCol = Math.random()>0.5 ? 0xef5350 : 0x29b6f6;
                const mat = new THREE.MeshLambertMaterial({color: bodyCol});
                
                // Detailed Body
                const body = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.5, 8), mat);
                body.rotation.x = Math.PI/2;
                this.mesh.add(body);
                
                // Head
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.12), mat);
                head.position.set(0, 0.1, 0.25);
                this.mesh.add(head);
                
                // Beak
                const beak = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.15), new THREE.MeshLambertMaterial({color: 0xffca28}));
                beak.rotation.x = Math.PI/2;
                beak.position.z = 0.1; head.add(beak);

                // Wings
                const wingGeo = new THREE.BoxGeometry(0.5, 0.05, 0.2);
                wingGeo.translate(0.25, 0, 0); // Pivot
                this.wingL = new THREE.Mesh(wingGeo, new THREE.MeshLambertMaterial({color:0xffffff}));
                this.wingL.position.set(0.1, 0.1, 0);
                this.mesh.add(this.wingL);

                this.wingR = new THREE.Mesh(wingGeo, new THREE.MeshLambertMaterial({color:0xffffff}));
                this.wingR.position.set(-0.1, 0.1, 0);
                this.wingR.rotation.y = Math.PI;
                this.mesh.add(this.wingR);

                scene.add(this.mesh);
                
                this.state = 'fly';
                this.target = new THREE.Vector3(0, 20, 0);
                this.angle = Math.random()*10;
                this.targetTree = null;
            }
            
            update() {
                // Flap Wings
                const speed = this.state === 'nest' ? 0 : 0.6;
                this.wingL.rotation.z = Math.sin(Date.now()*0.02) * speed;
                this.wingR.rotation.z = -this.wingL.rotation.z;

                if(this.state === 'fly') {
                    // Circle high up
                    this.angle += 0.01;
                    const r = 25;
                    this.target.set(Math.cos(this.angle)*r, 20+Math.sin(this.angle*3)*2, Math.sin(this.angle)*r);
                    
                    this.move(this.target, 0.1);
                    
                    // Look for tree occasionally
                    if(Math.random() > 0.99) {
                        const candidates = trees.filter(t => t.scale.y > 1.2 && !t.userData.occupied);
                        if(candidates.length > 0) {
                            this.targetTree = candidates[Math.floor(Math.random()*candidates.length)];
                            this.state = 'approach';
                        }
                    }
                } else if(this.state === 'approach') {
                    if(!this.targetTree.parent) { this.state='fly'; return; } // Tree deleted?
                    
                    const nestPos = this.targetTree.position.clone().add(new THREE.Vector3(0, 3.2, 0));
                    const dist = this.move(nestPos, 0.15);
                    
                    if(dist < 0.5) {
                        this.state = 'nest';
                        this.timer = 300; // Stay 5 seconds
                        // Add visual nest if needed
                        if(!this.targetTree.userData.hasNest) {
                            const nest = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.1, 4, 8), new THREE.MeshLambertMaterial({color:0x5d4037}));
                            nest.rotation.x=Math.PI/2; nest.position.y=3.0;
                            this.targetTree.add(nest);
                            this.targetTree.userData.hasNest = true;
                        }
                    }
                } else if(this.state === 'nest') {
                    this.timer--;
                    this.mesh.position.copy(this.targetTree.position).add(new THREE.Vector3(0, 3.3, 0));
                    this.mesh.rotation.x = -0.2; // Sit
                    if(this.timer <= 0) {
                        this.state = 'fly';
                        this.mesh.rotation.x = 0;
                    }
                }
            }
            
            move(tgt, speed) {
                const dir = new THREE.Vector3().subVectors(tgt, this.mesh.position);
                const dist = dir.length();
                if(dist > 0.1) {
                    dir.normalize();
                    this.mesh.lookAt(tgt);
                    this.mesh.position.add(dir.multiplyScalar(speed));
                }
                return dist;
            }
        }

        // B. REALISTIC GARDENER (Mannequin Style)
        class Gardener {
            constructor() {
                this.mesh = new THREE.Group();
                const pants = new THREE.MeshLambertMaterial({color: 0x1565c0});
                const shirt = new THREE.MeshLambertMaterial({color: Math.random()>0.5?0xc62828:0xffffff});
                const skin = new THREE.MeshLambertMaterial({color: 0xffcc80});

                // Body Parts (Cylinders for realism)
                const hips = new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.2,0.25), pants);
                hips.position.y=1.05; this.mesh.add(hips);
                
                const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.22,0.5), shirt);
                torso.position.y=0.35; hips.add(torso);
                
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.18), skin);
                head.position.y=0.45; torso.add(head);

                // Limbs
                this.legL = this.makeLimb(0.12, 0.9, pants); this.legL.position.set(0.12,-0.45,0); hips.add(this.legL);
                this.legR = this.makeLimb(0.12, 0.9, pants); this.legR.position.set(-0.12,-0.45,0); hips.add(this.legR);
                this.armL = this.makeLimb(0.09, 0.7, shirt); this.armL.position.set(0.3,0.1,0); torso.add(this.armL);
                this.armR = this.makeLimb(0.09, 0.7, shirt); this.armR.position.set(-0.3,0.1,0); torso.add(this.armR);

                scene.add(this.mesh);
                this.state = 'walk'; 
                this.target = this.getSafe();
                this.frame = Math.random()*100;
            }
            
            makeLimb(w, h, mat) {
                return new THREE.Mesh(new THREE.BoxGeometry(w,h,w), mat);
            }
            
            getSafe() {
                let p=new THREE.Vector3(), ok=false;
                while(!ok) {
                    const r=5+Math.random()*30, a=Math.random()*6.28;
                    p.set(Math.cos(a)*r, 0, Math.sin(a)*r);
                    if(isSafeZone(p.x,p.z)) ok=true;
                }
                return p;
            }
            
            update() {
                if(this.state === 'walk') {
                    const d = new THREE.Vector3().subVectors(this.target, this.mesh.position);
                    if(d.length() < 0.5) {
                        this.state = 'plant'; this.timer = 60;
                        // Reset Pose
                        this.armL.rotation.x=0; this.armR.rotation.x=0;
                    } else {
                        d.normalize(); this.mesh.position.add(d.multiplyScalar(0.04)); this.mesh.lookAt(this.target);
                        this.frame += 0.2;
                        // Walk Anim
                        this.legL.rotation.x = Math.sin(this.frame)*0.6;
                        this.legR.rotation.x = Math.sin(this.frame+Math.PI)*0.6;
                        this.armL.rotation.x = -this.legL.rotation.x;
                        this.armR.rotation.x = -this.legR.rotation.x;
                    }
                } else {
                    this.timer--;
                    this.mesh.rotation.x = 0.5; // Bend down
                    if(this.timer <= 0) {
                        const fwd = new THREE.Vector3(0,0,1).applyQuaternion(this.mesh.quaternion);
                        createTree(this.mesh.position.x + fwd.x, this.mesh.position.z + fwd.z);
                        this.state = 'walk'; this.target = this.getSafe(); this.mesh.rotation.x=0;
                    }
                }
            }
        }

        const trees = [];
        function createTree(x, z) {
            if(!isSafeZone(x,z)) return; // No water trees
            
            const g = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.3,2.5,6), new THREE.MeshLambertMaterial({color:0x5d4037}));
            trunk.position.y=1.25; g.add(trunk);
            const fol = new THREE.Mesh(new THREE.DodecahedronGeometry(1.2), new THREE.MeshLambertMaterial({color:0x43a047}));
            fol.position.y=2.8; g.add(fol);
            
            // Fruits
            const fruits=[];
            for(let i=0;i<3;i++) {
                const f = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshStandardMaterial({color:0xff3d00}));
                f.position.set((Math.random()-0.5), 2.8+Math.random(), (Math.random()-0.5));
                f.visible=false; g.add(f); fruits.push(f);
            }
            
            g.position.set(x,0,z); g.scale.set(0.01,0.01,0.01);
            g.userData = { fruits: fruits, hasNest: false };
            scene.add(g); trees.push(g);
        }

        // --- 5. RUN ---
        const gardeners = [new Gardener(), new Gardener(), new Gardener()];
        const birds = []; for(let i=0; i<15; i++) birds.push(new Bird());

        function animate() {
            requestAnimationFrame(animate);
            
            gardeners.forEach(g => g.update());
            birds.forEach(b => b.update());
            
            trees.forEach(t => {
                if(t.scale.y < 1.5) t.scale.addScalar(0.005);
                else t.userData.fruits.forEach(f => f.visible=true);
            });
            
            // Camera Orbit
            const t = Date.now()*0.0001;
            camera.position.x = Math.sin(t)*40;
            camera.position.z = Math.cos(t)*40;
            camera.lookAt(0, 5, 0);
            
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({ 
                pageLanguage: 'en', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE, 
                autoDisplay: false 
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <!-- Language Persistence Script -->
    <script>
        (function() {
            // 1. Get User's Choice
            const userLang = localStorage.getItem('userLanguage');
            
            if (userLang && userLang !== 'en') {
                // 2. Define the required cookie string for Google Translate
                const cookieValue = `/en/${userLang}`;
                
                // 3. Check if cookie is already correct to avoid infinite reloads
                const matches = document.cookie.match(/(^|;)\s*googtrans=([^;]+)/);
                const currentCookie = matches ? matches[2] : null;

                if (currentCookie !== cookieValue) {
                    // Set cookie to force translation
                    document.cookie = `googtrans=${cookieValue}; path=/`;
                    // Reload page to apply translation
                    window.location.reload();
                }
            }
        })();
    </script>
</body>
</html>
