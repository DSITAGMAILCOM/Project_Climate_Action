<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Climate Action</title>

    <!-- NEW: High-Security Meta Tags -->
    <!-- Content Security Policy: Only allows trusted sources -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://translate.google.com https://translate.googleapis.com https://www.gstatic.com data: blob: media:;">
    <!-- Prevent Clickjacking -->
    <meta http-equiv="X-Frame-Options" content="DENY">
    <!-- XSS Protection -->
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <!-- Prevent MIME Sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">

    <!-- NEW: Crypto-JS for Encryption -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-image: url(My\ Movie.mp4);background-repeat: no-repeat;background-size: cover; }
        .video-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }
        #bg-video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.3); z-index: 0; pointer-events: none; }
        
        /* Main Content hidden initially */
        .content { position: relative; z-index: 5; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: #fff; opacity: 0; transition: opacity 1s ease; pointer-events: none; }
        .content.active { opacity: 1; pointer-events: auto; }
        h1 { font-size: 4rem; margin-bottom: 0.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        p { font-size: 1.5rem; margin-bottom: 2rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .btn { padding: 15px 40px; font-size: 1.2rem; background: transparent; color: #fff; border: 2px solid #fff; border-radius: 30px; text-decoration: none; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 2px; }
        .btn:hover { background: #fff; color: #000; }

        /* Start Screen Overlay */
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: opacity 0.5s ease; }
        .click-text { color: white; font-size: 2rem; animation: pulse 1.5s infinite; }
        .status-text { color: #888; margin-top: 10px; font-size: 0.9rem; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        
        /* Google Translate Hiding */
        .goog-te-banner-frame { display: none !important; }
        body { top: 0px !important; }

        /* NEW: Security Badge Styling */
        .security-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .security-lock {
            font-size: 1rem;
        }
        .security-text {
            color: #fff;
            font-size: 0.7rem;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <!-- Google Translate Script -->
    <div id="google_translate_element" style="display:none;"></div>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({ pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE, autoDisplay: false }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <!-- NEW: Security Badge -->
    <div class="security-badge">
        <div class="security-lock">🔒</div>
        <span class="security-text">SECURE CONNECTION</span>
    </div>

    <!-- Start Screen: Handles Logic -->
    <div id="start-screen" onclick="handleStartClick()">
        <div class="click-text">Click anywhere to Register</div>
        <div class="status-text">(Required to enter site)</div>
    </div>

    <!-- Background Video -->
    <div class="video-container">
        <video id="bg-video" autoplay loop playsinline muted>
            <source src="My Movie.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>

    <!-- Main Content -->
    <div class="content" id="main-content">
        <h1>Nature's Legacy</h1>
        <p>Listen to the sound of the earth.</p>
        <a href="climate.html" class="btn">Enter Site</a>
    </div>

    <script>
        // --- HIGH SECURITY MODULE ---
        (function() {
            console.log("%c ENTERING SECURE ZONE ", "background: #000; color: #fff; font-size: 14px; padding: 5px;");
            
            // 1. Anti-Tamper / Anti-Debug
            document.addEventListener('contextmenu', event => event.preventDefault()); // Disable Right Click
            
            document.onkeydown = function(e) {
                // Disable F12, Ctrl+U, Ctrl+Shift+I (DevTools shortcuts)
                if(e.keyCode == 123) { return false; }
                if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)){ return false; }
                if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)){ return false; }
                if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)){ return false; }
                if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)){ return false; }
            };
        })();

        // CRITICAL CHECK: Runs immediately when page loads
        window.onload = function() {
            const isVerified = localStorage.getItem('isVerified');
            const userLang = localStorage.getItem('userLanguage');
            
            // Elements
            const startScreen = document.getElementById('start-screen');
            const content = document.getElementById('main-content');
            const video = document.getElementById('bg-video');

            if (isVerified === 'true') {
                // USER IS VERIFIED. 
                // 1. Try to play audio/video automatically
                video.muted = false;
                
                var playPromise = video.play();

                if (playPromise !== undefined) {
                    playPromise.then(_ => {
                        // Automatic playback started! Hide the screen.
                        startScreen.style.display = 'none'; 
                        startScreen.style.pointerEvents = 'none';
                        content.classList.add('active');
                    })
                    .catch(error => {
                        // Auto-play was blocked by browser.
                        // We MUST keep the screen and ask for a click.
                        console.log("Autoplay blocked. Waiting for user interaction.");
                        
                        startScreen.style.display = 'flex'; 
                        document.querySelector('.click-text').innerText = "Click to Enter World";
                        document.querySelector('.status-text').innerText = "Enable Audio Experience";

                        // Override click to start the site
                        startScreen.onclick = function() {
                            video.play();
                            startScreen.style.display = 'none';
                            content.classList.add('active');
                        };
                    });
                }

                // Apply Language Translation if needed
                if (userLang && userLang !== 'en') {
                    if (!getCookie('googtrans')) {
                        document.cookie = `googtrans=/en/${userLang}; path=/`;
                        window.location.reload();
                    }
                }
            } else {
                // USER NOT VERIFIED: Leaving the start screen visible. 
                console.log("User not verified yet.");
            }
        };

        function handleStartClick() {
            // Only redirect if NOT verified (Default behavior)
            const isVerified = localStorage.getItem('isVerified');
            if (isVerified !== 'true') {
                window.location.href = "EntryForm.html";
            }
        }

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }
    </script>
</body>
</html>
